name: Deploy Documentation

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
      - '*.R*'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Rebuild and publish every version (dev + release tags 24.R2, 26.R1) and set dev as default.'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Always build with the tooling on `main`; msg/srv for each version are overlaid
      # per-ref by docs/build_version.sh, so historical tags use the current generator.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          key: ${{ github.ref }}
          path: .cache

      - name: Install dependencies
        run: pip install -r docs-requirements.txt

      - name: Configure Git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # mike commits to the gh-pages branch; make sure it is available locally.
          git fetch origin gh-pages --depth=1 || true
          # Ensure release tags are present for overlay builds.
          git fetch --tags --force || true

      - name: Deploy versioned docs
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            # On-demand publish of all versions (used for the initial backfill).
            docs/build_version.sh 24.R2 24.R2
            docs/build_version.sh 26.R1 26.R1
            docs/build_version.sh main dev
            mike set-default --push dev
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # Release tag push: publish that release as its own version. dev stays default.
            docs/build_version.sh "${{ github.ref_name }}" "${{ github.ref_name }}"
          else
            # Branch push to main (or manual dispatch without backfill): refresh dev.
            docs/build_version.sh main dev
            mike set-default --push dev
          fi
