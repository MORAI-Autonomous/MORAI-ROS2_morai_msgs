name: Deploy Documentation

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label to publish (e.g. v1.2.0). Leave blank to publish as "dev".'
        required: false
        default: ''
      alias:
        description: 'Alias to attach (e.g. latest). Leave blank for none.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          key: ${{ github.ref }}
          path: .cache

      - name: Install dependencies
        run: pip install -r docs-requirements.txt

      - name: Configure Git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # mike commits to the gh-pages branch; make sure it is available locally.
          git fetch origin gh-pages --depth=1 || true

      - name: Generate documentation pages
        run: python docs/generate_docs.py

      - name: Determine version and alias
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Tag push: publish under the tag name and mark it as the latest release.
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "alias=latest" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            # Manual dispatch with an explicit version.
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "alias=${{ github.event.inputs.alias }}" >> "$GITHUB_OUTPUT"
          else
            # Branch push (or dispatch without a version): publish the in-progress docs.
            echo "version=dev" >> "$GITHUB_OUTPUT"
            echo "alias=" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy versioned docs
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          ALIAS="${{ steps.ver.outputs.alias }}"
          if [ -n "$ALIAS" ]; then
            mike deploy --push --update-aliases "$VERSION" "$ALIAS"
            mike set-default --push "$ALIAS"
          else
            mike deploy --push "$VERSION"
          fi
